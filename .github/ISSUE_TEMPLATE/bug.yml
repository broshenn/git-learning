name: 缺陷报告
description: 报告一个可以复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 提供最短、稳定的复现路径。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: v0.1.0 或 git rev-parse --short HEAD 的输出
    validations:
      required: true

