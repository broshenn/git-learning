name: 功能需求
description: 提议一个可交付的新能力
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述用户场景和当前痛点。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 列出可以客观验证的完成条件。
      placeholder: |
        - 可以按负责人筛选工单
        - 无匹配结果时输出 no tickets
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 补充信息
      description: 可选的技术约束、截图或相关链接。

